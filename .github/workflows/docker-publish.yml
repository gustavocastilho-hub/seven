name: Build and Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/strategicai-hub/seven:latest
            ghcr.io/strategicai-hub/seven:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy (all services)
        if: success()
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          SERVICES: seven_seven-api seven_seven-worker seven_seven-scheduler
        run: |
          if [ -z "$PORTAINER_URL" ] || [ -z "$PORTAINER_TOKEN" ]; then
            echo "PORTAINER_URL or PORTAINER_TOKEN not set, skipping redeploy."
            exit 0
          fi
          for SVC_NAME in $SERVICES; do
            echo "Updating $SVC_NAME..."
            SVC=$(curl -fsSLk -H "X-API-Key: $PORTAINER_TOKEN" \
              "$PORTAINER_URL/api/endpoints/1/docker/services" \
              | jq -r ".[] | select(.Spec.Name==\"$SVC_NAME\")")
            SVC_ID=$(echo "$SVC" | jq -r '.ID')
            VER=$(echo "$SVC" | jq -r '.Version.Index')
            SPEC=$(echo "$SVC" | jq '.Spec | .TaskTemplate.ForceUpdate += 1')
            curl -fsSLk -X POST \
              -H "X-API-Key: $PORTAINER_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$SPEC" \
              "$PORTAINER_URL/api/endpoints/1/docker/services/$SVC_ID/update?version=$VER"
            echo " -> $SVC_NAME updated"
          done
